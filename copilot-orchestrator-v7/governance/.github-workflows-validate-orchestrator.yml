name: Validate orchestrator

# Runs on every PR to the org's .github-private orchestrator repo.
# Fails the PR when:
#   - any SKILL.md or agent.md has invalid frontmatter
#   - any JSON Schema is malformed
#   - any Python script fails py_compile or basic smoke test
#   - the canary flow fails to load agents against the bundled sample app

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  validate-agents:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install pyyaml jsonschema
      - name: Validate agent frontmatter
        run: python governance/validators/validate_agents.py agents/
      - name: Validate skill frontmatter
        run: python governance/validators/validate_skills.py skills/
      - name: Validate schemas parse
        run: python -c "import json; [json.load(open(f)) for f in __import__('pathlib').Path('schemas').glob('*.json')]"

  validate-skills:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check no SKILL.md > 500 lines
        run: |
          for f in $(find skills -name SKILL.md); do
            n=$(wc -l < "$f")
            if [ "$n" -gt 500 ]; then echo "::error file=$f::SKILL.md is $n lines (>500 max)"; exit 1; fi
          done
      - name: Check no SKILL.md missing description
        run: |
          for f in $(find skills -name SKILL.md); do
            if ! head -10 "$f" | grep -q '^description:'; then
              echo "::error file=$f::missing description in frontmatter"; exit 1
            fi
          done

  lint-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - name: Compile all Python
        run: find . -name "*.py" -not -path "./.git/*" -exec python -m py_compile {} +

  test-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - name: Smoke test scan_repo on this repo
        run: python skills/scan-repo/scripts/scan_repo.py --root . --name self | python -c "import json,sys; d=json.load(sys.stdin); assert 'stack' in d"
      - name: Smoke test audit_log
        run: |
          TMPDIR=$(mktemp -d)
          COPILOT_AUDIT_DIR="$TMPDIR" python scripts/audit_log.py \
            --session test --agent implementer --model claude-sonnet-4.5 \
            --phase end --tool editFiles --tool-status ok
          test -f "$TMPDIR/test.jsonl"

  canary-orchestrator-flow:
    runs-on: ubuntu-latest
    needs: [validate-agents, validate-skills, lint-python]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - name: Run each canary app's smoke test
        run: |
          for app in governance/canary-apps/*/; do
            if [ -f "$app/run-canary.sh" ]; then
              echo "=== $app ==="
              bash "$app/run-canary.sh"
            fi
          done
